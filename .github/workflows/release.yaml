name: GitHub Release
on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Generate Debian Source Package
        run: cargo deb

      - name: Create Automated GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          make_latest: ${{ github.ref_type != 'tag' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Development Build' }}
          files: target/debian/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
