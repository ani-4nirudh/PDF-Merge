name: Publish to Ubuntu PPA

on:
  push:
    tags:
      - 'v*' # Triggers whenever you push a version tag like v1.0.0

jobs:
  publish-ppa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Generate Debian Source Package
        # --src generates a source package (.dsc) instead of a binary (.deb) 
        # Launchpad requires the source package to build it on their servers
        run: cargo deb --src

      - name: Upload to Launchpad PPA
        uses: yuezk/publish-ppa-package@v2
        with:
          repository: "ani-4nirudh/pdfmerge" # Replace with your actual PPA name
          gpg_private_key: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
          gpg_passphrase: ${{ secrets.PPA_GPG_PASSPHRASE }}
          # Points to the source changes file generated by cargo-deb
          tarball: "target/debian/pdfmerge_*.changes" 
          deb_email: "anirudh.sai8296@gmail.com"
          deb_fullname: "Anirudh Singh"
          series: "noble jammy" # Ubuntu releases you want to target
